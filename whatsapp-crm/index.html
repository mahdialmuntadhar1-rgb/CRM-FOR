<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhatsApp CRM - Iraq Business Outreach</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }
    .container {
      max-width: 600px;
      padding: 2rem;
      text-align: center;
    }
    h1 { font-size: 2.5rem; margin-bottom: 1rem; }
    p { font-size: 1.1rem; opacity: 0.9; margin-bottom: 2rem; }
    .badge {
      display: inline-block;
      background: rgba(255,255,255,0.2);
      padding: 0.5rem 1rem;
      border-radius: 9999px;
      font-size: 0.875rem;
      margin: 0.25rem;
    }
    .status {
      margin-top: 2rem;
      padding: 1rem;
      background: rgba(255,255,255,0.1);
      border-radius: 0.5rem;
    }
    code {
      background: rgba(0,0,0,0.3);
      padding: 0.25rem 0.5rem;
      border-radius: 0.25rem;
      font-family: 'Monaco', 'Consolas', monospace;
    }
    a { color: #93c5fd; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📱 WhatsApp CRM</h1>
    <p>Bulk messaging system for Iraqi business outreach</p>
    
    <div>
      <span class="badge">Node.js</span>
      <span class="badge">TypeScript</span>
      <span class="badge">Supabase</span>
      <span class="badge">Nabda OTP</span>
    </div>

    <div class="status">
      <p>✅ Webhook Server Active</p>
      <p>Endpoint: <code>POST /api/webhook</code></p>
      <p>Health: <a href="/api/webhook">GET /api/webhook</a></p>
    </div>

    <div style="margin-top: 2rem; font-size: 0.875rem; opacity: 0.7;">
      <p>GitHub: <a href="https://github.com/mahdialmuntadhar1-rgb/malabazen">mahdialmuntadhar1-rgb/malabazen</a></p>
    </div>
  </div>
</body>
</html>
